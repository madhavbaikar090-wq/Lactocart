<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="header">

<div class="logo">
<img src="/static/images/logo.png">
<h2>LactoCart</h2>
</div>

<div>
<a href="/cart">🛒 {{cart}}</a>
</div>

</div>

<h2>Receipt</h2>

{% if cart_items %}

    {% for item in cart_items %}
        <p>{{ item['name'] }} - ₹{{ item['price'] }}</p>
    {% endfor %}

    <h3>Total ₹{{ total }}</h3>

    <p>Payment Method: Cash On Delivery</p>
    <p>Status: On the way 🚚</p>

{% else %}

    <p>No items purchased</p>

{% endif %}

</body>
</html>
